<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Quest — charity: water</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFC907;
      --yellow-light: #FFE066;
      --black: #111111;
      --dark: #1a1a1a;
      --cell-bg: #2a2a2a;
      --cell-hover: #333;
      --white: #ffffff;
      --green: #27ae60;
      --red: #e74c3c;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 0;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-dot {
      width: 14px; height: 14px;
      background: var(--yellow);
      border-radius: 50%;
    }

    .brand-tag {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--yellow);
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    h1 span { color: var(--yellow); }

    .tagline {
      font-size: 0.95rem;
      color: #aaa;
      margin-top: 6px;
    }

    /* ── DIFFICULTY ── */
    #difficulty-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 480px;
    }

    #difficulty-section p {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    <!-- JavaScript moved to script.js -->
      color: #888;
    }

    .diff-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      padding: 10px 24px;
      border-radius: 50px;
      border: 2px solid #444;
      background: transparent;
      color: #aaa;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diff-btn:hover { border-color: var(--yellow); color: var(--yellow); }

    .diff-btn.selected {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--black);
    }

    /* ── STATS BAR ── */
    #stats-bar {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 14px;
    }

    .stat-box {
      flex: 1;
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }

    /* ── PROGRESS BAR ── */
    #progress-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 14px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .progress-track {
      background: #222;
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--yellow);
      border-radius: 50px;
      transition: width 0.3s ease;
    }

    /* ── MILESTONE MESSAGE ── */
    #milestone-msg {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--yellow);
      margin-bottom: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      text-align: center;
    }

    #milestone-msg.show { opacity: 1; }
    #milestone-msg.milestone-celebration { color: #FFE066; text-shadow: 0 0 12px rgba(255,201,7,0.5); }
    #milestone-msg.milestone-warning     { color: #e74c3c; }
    #milestone-msg.milestone-normal      { color: var(--yellow); }

    /* ── GAME GRID ── */
    #game-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .grid-cell {
      aspect-ratio: 1;
      background: var(--cell-bg);
      border-radius: 14px;
      border: 2px solid #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }

    /* ── JERRY CAN ── */
    .water-can-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .jerry-can {
      width: 54px;
      height: 68px;
      position: relative;
      transition: transform 0.15s;
    }

    .water-can-wrapper:hover .jerry-can { transform: scale(1.1) rotate(-3deg); }

    /* SVG jerry can drawn with CSS */
    .can-body {
      width: 48px;
      height: 56px;
      background: var(--yellow);
      border-radius: 6px 6px 8px 8px;
      position: absolute;
      bottom: 0;
      left: 3px;
      box-shadow: inset -5px 0 0 rgba(0,0,0,0.15), inset 3px 0 0 rgba(255,255,255,0.2);
    }

    .can-handle {
      width: 18px;
      height: 18px;
      border: 5px solid var(--yellow);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      right: -2px;
      background: transparent;
    }

    .can-neck {
      width: 22px;
      height: 10px;
      background: #e6b400;
      border-radius: 4px 4px 0 0;
      position: absolute;
      top: 0;
      left: 11px;
    }

    .can-cap {
      width: 16px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      position: absolute;
      top: -6px;
      left: 14px;
    }

    .can-stripe {
      width: 100%;
      height: 4px;
      background: rgba(0,0,0,0.15);
      position: absolute;
      top: 18px;
    }

    /* clicked flash */
    .water-can-wrapper.clicked .can-body {
      background: var(--yellow-light);
    }

    /* ── OBSTACLE ── */
    .obstacle-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: popIn 0.2s ease;
    }

    .mud {
      width: 64px;
      height: 64px;
      background: radial-gradient(circle at 40% 38%, #7a3f0e, #3d1f05);
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border: 2px solid #5c3d1e;
      transition: transform 0.1s;
    }

    .obstacle-wrapper:hover .mud { transform: scale(1.08); }

    /* penalty screen flash */
    @keyframes penaltyFlash {
      0%   { background: rgba(231,76,60,0.25); }
      100% { background: transparent; }
    }

    .penalty-flash {
      animation: penaltyFlash 0.4s ease forwards;
    }

    /* obstacle shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    .shaking { animation: shake 0.35s ease; }

    /* ── RESET BUTTON ── */
    #reset-btn {
      display: none;
      padding: 10px 28px;
      background: transparent;
      color: #888;
      border: 2px solid #444;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    #reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* button row */
    #btn-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    #btn-row #start-btn { margin-bottom: 0; }
    #btn-row #reset-btn { margin-bottom: 0; }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 200;
      display: none;
    }

    /* ── SCORE POPUP ── */
    .score-popup {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--yellow);
      pointer-events: none;
      z-index: 10;
      animation: floatUp 0.6s ease forwards;
    }

    .score-popup.penalty { color: var(--red); }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.2); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-50px) scale(0.8); }
    }

    /* ── BUTTONS ── */
    #start-btn {
      padding: 14px 40px;
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,201,7,0.3);
      margin-bottom: 20px;
    }

    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,201,7,0.45);
    }

    #start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── GAME OVER OVERLAY ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    #overlay.show { display: flex; }

    #overlay-emoji { font-size: 4rem; }

    #overlay-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--yellow);
    }

    #overlay-msg {
      font-size: 1rem;
      color: #ccc;
      max-width: 300px;
      line-height: 1.5;
    }

    #overlay-score {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    #play-again-btn {
      padding: 14px 36px;
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s;
    }

    #play-again-btn:hover { transform: scale(1.04); }

    /* ── FOOTER ── */
    footer {
      width: 100%;
      max-width: 480px;
      text-align: center;
      padding: 18px 0 28px;
      border-top: 1px solid #2a2a2a;
      margin-top: auto;
    }

    footer p {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 8px;
    }

    footer a {
      color: var(--yellow);
      text-decoration: none;
      font-weight: 700;
      margin: 0 8px;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }

    footer a:hover { opacity: 0.75; }

    /* ── RESPONSIVE ── */
    @media (max-width: 380px) {
      #game-grid { gap: 7px; }
      .jerry-can { width: 44px; height: 56px; }
      .can-body { width: 38px; height: 45px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-row">
      <div class="logo-dot"></div>
      <span class="brand-tag">charity: water</span>
      <div class="logo-dot"></div>
    </div>
    <h1>Water <span>Quest</span></h1>
    <p class="tagline">Collect jerry cans. Bring water to the world. 💧</p>
  </header>

  <!-- DIFFICULTY -->
  <div id="difficulty-section">
    <p>Choose Difficulty</p>
    <div class="diff-buttons">
      <button class="diff-btn selected" data-mode="easy">Easy</button>
      <button class="diff-btn" data-mode="normal">Normal</button>
      <button class="diff-btn" data-mode="hard">Hard</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats-bar">
    <div class="stat-box">
      <span class="stat-label">🪣 Cans</span>
      <span class="stat-value" id="cans-count">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">🎯 Goal</span>
      <span class="stat-value" id="goal-count">15</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">⏱ Time</span>
      <span class="stat-value" id="timer-display">30s</span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- MILESTONE -->
  <div id="milestone-msg">💧 Keep going!</div>

  <!-- GRID -->
  <div id="game-grid"></div>

  <!-- BUTTON ROW -->
  <div id="btn-row">
    <button id="start-btn">Start Game 🚀</button>
    <button id="reset-btn">↺ Reset</button>
  </div>

  <!-- CONFETTI -->
  <canvas id="confetti-canvas"></canvas>

  <!-- GAME OVER OVERLAY -->
  <div id="overlay">
    <div id="overlay-emoji">💧</div>
    <div id="overlay-title">Time's Up!</div>
    <div id="overlay-msg">Every can counts. Try again!</div>
    <div id="overlay-score"></div>
    <button id="play-again-btn">Play Again</button>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>This game is inspired by the real mission of charity: water.</p>
    <a href="https://www.charitywater.org" target="_blank">Visit charity: water →</a>
    <a href="https://www.charitywater.org/donate" target="_blank">💛 Donate Now</a>
  </footer>

  <script>
    // ── CONFIG ──
    const MODES = {
      easy:   { goal: 15, speed: 1600, time: 40, obstacles: false },
      normal: { goal: 25, speed: 1000, time: 30, obstacles: true  },
      hard:   { goal: 40, speed: 550,  time: 25, obstacles: true  }
    };

    // ════════════════════════════════════════════════
    // 🔊 SOUND SYSTEM
    // ── HOW TO ADD YOUR OWN SOUNDS ──────────────────
    // 1. Download free sounds from pixabay.com or freesound.org
    // 2. Rename your files to match the names below
    //    (or change the names below to match your files)
    // 3. Upload them into your Codespace's project folder
    // 4. Update the file paths below to point to them
    //
    // Suggested searches on Pixabay / Freesound:
    //   collect  → "water splash", "coin collect", "ding"
    //   obstacle → "error", "buzz", "wrong answer"
    //   win      → "fanfare", "success", "victory"
    //   start    → "whoosh", "game start"
    //   milestone→ "chime", "level up"
    // ════════════════════════════════════════════════
    const SOUNDS = {
      collect:   new Audio('sounds/collect.mp3'),   // played when you grab a can ✅
      obstacle:  new Audio('sounds/obstacle.mp3'),  // played when you hit ☠️
      win:       new Audio('sounds/win.mp3'),       // played on victory screen
      lose:      new Audio('sounds/lose.mp3'),      // played on time's up
      start:     new Audio('sounds/start.mp3'),     // played when game begins
      milestone: new Audio('sounds/milestone.mp3'), // played on milestone messages
    };

    // Set volumes (0.0 = silent, 1.0 = full)
    SOUNDS.collect.volume   = 0.7;
    SOUNDS.obstacle.volume  = 0.8;
    SOUNDS.win.volume       = 0.9;
    SOUNDS.lose.volume      = 0.6;
    SOUNDS.start.volume     = 0.5;
    SOUNDS.milestone.volume = 0.7;

    // Safe play helper — silently ignores missing files so game still works
    // even if a sound file hasn't been added yet
    function playSound(name) {
      const audio = SOUNDS[name];
      if (!audio) return;
      audio.currentTime = 0; // rewind so rapid clicks always replay
      audio.play().catch(() => {}); // catch = browser blocks or file missing
    }

    // ════════════════════════════════════════════════
    // 🏆 MILESTONE MESSAGES ARRAY
    // Each object has:
    //   at  → how many cans triggers this message
    //   pct → OR what % of the goal triggers it (optional)
    //   msg → the message shown in the banner
    //   type→ "normal" | "warning" | "celebration"
    // ════════════════════════════════════════════════
    const MILESTONES = [
      { at: 1,                        msg: "💧 First can collected! Keep tapping!",         type: "normal"      },
      { pct: 0.25,                    msg: "⚡ 25% there — you're off to a great start!",    type: "normal"      },
      { pct: 0.50,                    msg: "🌊 Halfway there! A family now has clean water!", type: "celebration" },
      { pct: 0.75,                    msg: "🔥 75%! Almost enough for a whole village!",     type: "celebration" },
      { pct: 0.90,                    msg: "🚀 SO CLOSE! Just a few more cans!",             type: "warning"     },
      // Fixed-score messages (only show if goal is high enough)
      { at: 5,                        msg: "🏡 5 people now have access to clean water!",    type: "normal"      },
      { at: 10,                       msg: "🌍 10 cans! A whole family is saved!",           type: "celebration" },
      { at: 20,                       msg: "🏘️ 20 cans! An entire village is thriving!",    type: "celebration" },
      { at: 30,                       msg: "🚰 30 cans! You're a certified water hero!",     type: "celebration" },
    ];

    // ── STATE ──
    let currentMode = 'easy';
    let currentCans = 0;
    let gameActive  = false;
    let spawnInterval, timerInterval;
    let timeLeft = 40;
    let goalCans = 15;
    let shownMilestones = new Set();

    // ── DOM REFS ──
    const grid        = document.getElementById('game-grid');
    const cansEl      = document.getElementById('cans-count');
    const goalEl      = document.getElementById('goal-count');
    const timerEl     = document.getElementById('timer-display');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const milestoneEl = document.getElementById('milestone-msg');
    const startBtn    = document.getElementById('start-btn');
    const resetBtn    = document.getElementById('reset-btn');
    const overlay     = document.getElementById('overlay');
    const diffSection = document.getElementById('difficulty-section');
    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx         = confettiCanvas.getContext('2d');

    // ── DIFFICULTY BUTTONS ──
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (gameActive) return;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        currentMode = btn.dataset.mode;
        const cfg = MODES[currentMode];
        goalEl.textContent = cfg.goal;
        timerEl.textContent = cfg.time + 's';
      });
    });

    // ── BUILD GRID ──
    function createGrid() {
      grid.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        grid.appendChild(cell);
      }
    }
    createGrid();

    // ── SPAWN ──
    function spawnItem() {
      if (!gameActive) return;
      const cells = Array.from(document.querySelectorAll('.grid-cell'));
      const cfg   = MODES[currentMode];
      cells.forEach(c => c.innerHTML = '');

      const canIdx = Math.floor(Math.random() * cells.length);
      spawnCan(cells[canIdx]);

      if (cfg.obstacles && Math.random() < 0.4) {
        let obsIdx;
        do { obsIdx = Math.floor(Math.random() * cells.length); }
        while (obsIdx === canIdx);
        spawnObstacle(cells[obsIdx]);
      }
    }

    function spawnCan(cell) {
      const wrapper = document.createElement('div');
      wrapper.className = 'water-can-wrapper';
      wrapper.innerHTML = `
        <div class="jerry-can">
          <div class="can-cap"></div>
          <div class="can-neck"></div>
          <div class="can-body"><div class="can-stripe"></div></div>
          <div class="can-handle"></div>
        </div>`;
      wrapper.addEventListener('click', () => collectCan(cell, wrapper));
      cell.appendChild(wrapper);
    }

    function spawnObstacle(cell) {
      const wrapper = document.createElement('div');
      wrapper.className = 'obstacle-wrapper';
      wrapper.innerHTML = `<div class="mud">☠️</div>`;
      wrapper.addEventListener('click', () => hitObstacle(cell, wrapper));
      cell.appendChild(wrapper);
    }

    // ── COLLECT CAN ──
    function collectCan(cell, wrapper) {
      if (!gameActive) return;
      wrapper.classList.add('clicked');

      playSound('collect'); // 🔊 splash/ding on collect

      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = '+1 💧';
      cell.appendChild(popup);
      setTimeout(() => popup.remove(), 650);

      setTimeout(() => { if (cell.contains(wrapper)) cell.innerHTML = ''; }, 280);

      currentCans++;
      updateScore();
      checkMilestone();
      if (currentCans >= goalCans) endGame(true);
    }

    // ── HIT OBSTACLE ── (Challenge: reduces score by 2, shakes grid, flashes screen)
    function hitObstacle(cell, wrapper) {
      if (!gameActive) return;

      playSound('obstacle'); // 🔊 buzz/error on obstacle hit

      // Shake the cell
      cell.classList.add('shaking');
      setTimeout(() => cell.classList.remove('shaking'), 400);

      // Flash the body red
      document.body.classList.add('penalty-flash');
      setTimeout(() => document.body.classList.remove('penalty-flash'), 400);

      // Penalty is -2 cans (more impactful challenge)
      const penalty = 2;
      const popup = document.createElement('div');
      popup.className = 'score-popup penalty';
      popup.textContent = `-${penalty} 💣`;
      cell.appendChild(popup);
      setTimeout(() => popup.remove(), 700);

      setTimeout(() => { if (cell.contains(wrapper)) cell.innerHTML = ''; }, 320);

      currentCans = Math.max(0, currentCans - penalty);
      updateScore();
      showMilestone(`💣 Obstacle! -${penalty} cans!`);
    }

    // ── UPDATE SCORE ──
    function updateScore() {
      cansEl.textContent = currentCans;
      const pct = Math.min(100, Math.round((currentCans / goalCans) * 100));
      progressBar.style.width = pct + '%';
      progressPct.textContent = pct + '%';
    }

    // ── MILESTONES ──
    function checkMilestone() {
      for (const m of MILESTONES) {
        // Determine the threshold — either a fixed score or a % of the goal
        const threshold = m.at !== undefined ? m.at : Math.round(m.pct * goalCans);
        const key = m.at !== undefined ? `at-${m.at}` : `pct-${m.pct}`;

        if (currentCans >= threshold && !shownMilestones.has(key)) {
          shownMilestones.add(key);
          showMilestone(m.msg, m.type);
          playSound('milestone'); // 🔊 chime on every milestone
        }
      }
    }

    function showMilestone(msg, type = 'normal') {
      milestoneEl.textContent = msg;
      milestoneEl.className = ''; // clear old type classes
      milestoneEl.classList.add('show', `milestone-${type}`);
      clearTimeout(milestoneEl._timeout);
      milestoneEl._timeout = setTimeout(() => {
        milestoneEl.classList.remove('show');
      }, 3000);
    }

    // ── TIMER ──
    function startTimer() {
      const cfg = MODES[currentMode];
      timeLeft = cfg.time;
      timerEl.textContent = timeLeft + 's';
      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft + 's';
        if (timeLeft <= 5) timerEl.style.color = '#e74c3c';
        if (timeLeft <= 0) endGame(false);
      }, 1000);
    }

    // ── RESET ── (stops game, restores UI to pre-start state)
    function resetGame() {
      gameActive = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      stopConfetti();

      currentCans = 0;
      shownMilestones = new Set();

      createGrid();
      cansEl.textContent = '0';
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      timerEl.style.color = '';
      timerEl.textContent = MODES[currentMode].time + 's';
      milestoneEl.classList.remove('show');
      overlay.classList.remove('show');

      startBtn.disabled = false;
      resetBtn.style.display = 'none';
      diffSection.style.opacity = '';
      diffSection.style.pointerEvents = '';
    }

    // ── START ──
    function startGame() {
      currentCans = 0;
      shownMilestones = new Set();
      gameActive = true;
      const cfg = MODES[currentMode];
      goalCans = cfg.goal;

      goalEl.textContent = goalCans;
      timerEl.style.color = '';
      updateScore();
      createGrid();

      startBtn.disabled = true;
      resetBtn.style.display = 'block';
      diffSection.style.opacity = '0.3';
      diffSection.style.pointerEvents = 'none';

      playSound('start'); // 🔊 whoosh on game start

      spawnItem();
      spawnInterval = setInterval(spawnItem, cfg.speed);
      startTimer();
    }

    // ── END ──
    function endGame(won) {
      gameActive = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      createGrid();

      const emoji   = document.getElementById('overlay-emoji');
      const title   = document.getElementById('overlay-title');
      const msg     = document.getElementById('overlay-msg');
      const scoreEl = document.getElementById('overlay-score');

      if (won) {
        emoji.textContent = '🏆';
        title.textContent = 'You Did It!';
        msg.textContent   = 'You collected enough cans to bring clean water to a community. Amazing!';
        playSound('win');      // 🔊 fanfare on win
        launchConfetti();
      } else {
        emoji.textContent = currentCans >= Math.floor(goalCans * 0.6) ? '💪' : '💧';
        title.textContent = currentCans >= Math.floor(goalCans * 0.6) ? 'So Close!' : "Time's Up!";
        msg.textContent   = currentCans >= Math.floor(goalCans * 0.6)
          ? 'You were almost there! Give it one more try.'
          : 'Every drop matters. Keep going — the world needs water heroes!';
        playSound('lose');     // 🔊 lose sound on time's up
      }

      scoreEl.textContent = `You collected ${currentCans} of ${goalCans} cans.`;
      overlay.classList.add('show');
    }

    // ── PLAY AGAIN ──
    document.getElementById('play-again-btn').addEventListener('click', resetGame);

    // ── RESET BUTTON ──
    resetBtn.addEventListener('click', resetGame);

    // ── START BUTTON ──
    startBtn.addEventListener('click', startGame);

    // ════════════════════════════════
    // 🎉 CONFETTI ENGINE
    // ════════════════════════════════
    let confettiParticles = [];
    let confettiAnimId = null;
    const CONFETTI_COLORS = ['#FFC907','#FFE066','#ffffff','#27ae60','#3498db','#e74c3c','#f39c12'];

    function launchConfetti() {
      confettiCanvas.width  = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      confettiCanvas.style.display = 'block';
      confettiParticles = [];

      // create 160 particles
      for (let i = 0; i < 160; i++) {
        confettiParticles.push({
          x:      Math.random() * confettiCanvas.width,
          y:      Math.random() * confettiCanvas.height - confettiCanvas.height,
          w:      Math.random() * 12 + 5,
          h:      Math.random() * 7 + 4,
          color:  CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          rot:    Math.random() * Math.PI * 2,
          rotSpd: (Math.random() - 0.5) * 0.15,
          speedX: (Math.random() - 0.5) * 3,
          speedY: Math.random() * 3 + 2,
          opacity: 1
        });
      }
      animateConfetti();

      // auto-stop after 4s
      setTimeout(stopConfetti, 4000);
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      confettiParticles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();

        p.x     += p.speedX;
        p.y     += p.speedY;
        p.rot   += p.rotSpd;
        p.speedY += 0.05; // gravity

        // fade out near bottom
        if (p.y > confettiCanvas.height * 0.75) {
          p.opacity -= 0.025;
        }
      });

      // remove faded particles
      confettiParticles = confettiParticles.filter(p => p.opacity > 0);

      if (confettiParticles.length > 0) {
        confettiAnimId = requestAnimationFrame(animateConfetti);
      } else {
        stopConfetti();
      }
    }

    function stopConfetti() {
      if (confettiAnimId) { cancelAnimationFrame(confettiAnimId); confettiAnimId = null; }
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiCanvas.style.display = 'none';
      confettiParticles = [];
    }

    window.addEventListener('resize', () => {
      if (confettiCanvas.style.display !== 'none') {
        confettiCanvas.width  = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
    });
  </script>
</body>
